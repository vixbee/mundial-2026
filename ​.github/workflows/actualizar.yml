name: Actualizar proyección Mundial 2026

on:
  schedule:
    - cron: '0 14 * * *'   # todos los días 14:00 UTC (~08:00 CDMX). Ajusta a tu gusto.
  workflow_dispatch:        # botón para correrlo manualmente

permissions:
  contents: write           # permite que el Action haga commit de los archivos nuevos

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install numpy openpyxl

      - name: Descargar resultados reales (openfootball, sin API key)
        run: python fetch_results.py

      - name: Regenerar datos, página y Excel
        run: |
          python gen_html.py
          python master.py
          python write_html.py

      - name: Publicar si hubo cambios
        run: |
          git config user.name  "wc2026-bot"
          git config user.email "actions@github.com"
          git add index.html wcdata.json results.json Proyeccion-Mundial-2026-MAESTRO.xlsx
          git diff --staged --quiet || git commit -m "Actualización automática $(date -u +%F)"
          git push
